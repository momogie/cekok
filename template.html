<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeployKit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg0: #0d0f14;
  --bg1: #13161e;
  --bg2: #1a1e28;
  --bg3: #222636;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text1: #e8eaf0;
  --text2: #8b8fa8;
  --text3: #4e5268;
  --accent: #00c9a7;
  --accent2: #0097ff;
  --warn: #f0a500;
  --danger: #f05060;
  --success: #00c9a7;
  --purple: #8b7fff;
  --radius: 10px;
  --radius-sm: 6px;
  --font: 'Sora', sans-serif;
  --mono: 'JetBrains Mono', monospace;
  --sidebar: 220px;
  --transition: 0.2s ease;
}
[data-theme="light"] {
  --bg0: #f0f2f7;
  --bg1: #ffffff;
  --bg2: #f5f6fa;
  --bg3: #eaecf3;
  --border: rgba(0,0,0,0.07);
  --border2: rgba(0,0,0,0.13);
  --text1: #1a1d2e;
  --text2: #5a5e7a;
  --text3: #a0a4b8;
  --accent: #009e84;
  --accent2: #0077cc;
}

* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; font-family:var(--font); background:var(--bg0); color:var(--text1); font-size:14px; line-height:1.5; transition:background var(--transition), color var(--transition); }

/* ── Scrollbar ── */
::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:99px; }

/* ── Layout ── */
.shell { display:flex; height:100vh; overflow:hidden; }

/* ── Sidebar ── */
.sidebar {
  width:var(--sidebar); flex-shrink:0;
  background:var(--bg1); border-right:1px solid var(--border);
  display:flex; flex-direction:column; overflow:hidden;
  transition:background var(--transition);
}
.sidebar-logo {
  padding:20px 16px 14px;
  display:flex; align-items:center; gap:10px;
  border-bottom:1px solid var(--border);
}
.logo-icon {
  width:30px; height:30px; border-radius:8px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex; align-items:center; justify-content:center;
  font-size:14px; font-weight:700; color:#fff; letter-spacing:-0.5px;
  flex-shrink:0;
}
.logo-text { font-size:15px; font-weight:600; letter-spacing:-0.3px; }
.logo-text span { color:var(--accent); }

.sidebar-nav { flex:1; padding:10px 8px; overflow-y:auto; }
.nav-section { margin-bottom:18px; }
.nav-label { font-size:10px; font-weight:600; letter-spacing:1.2px; text-transform:uppercase; color:var(--text3); padding:0 8px; margin-bottom:4px; }
.nav-item {
  display:flex; align-items:center; gap:10px;
  padding:8px 10px; border-radius:var(--radius-sm);
  color:var(--text2); cursor:pointer; transition:all var(--transition);
  font-size:13px; font-weight:400; user-select:none;
}
.nav-item:hover { background:var(--bg2); color:var(--text1); }
.nav-item.active { background:rgba(0,201,167,0.1); color:var(--accent); font-weight:500; }
.nav-icon { width:16px; height:16px; opacity:0.8; flex-shrink:0; }
.nav-item .badge {
  margin-left:auto; font-size:10px; font-weight:600;
  background:var(--danger); color:#fff;
  border-radius:99px; padding:1px 6px;
}

.sidebar-footer { padding:12px 8px; border-top:1px solid var(--border); }
.theme-toggle {
  display:flex; align-items:center; gap:8px;
  padding:8px 10px; border-radius:var(--radius-sm);
  cursor:pointer; color:var(--text2); font-size:13px;
  transition:all var(--transition);
}
.theme-toggle:hover { background:var(--bg2); color:var(--text1); }
.toggle-track {
  width:34px; height:18px; border-radius:99px; background:var(--bg3);
  border:1px solid var(--border2); position:relative; transition:background var(--transition);
  margin-left:auto; flex-shrink:0;
}
[data-theme="light"] .toggle-track { background:var(--accent); }
.toggle-thumb {
  position:absolute; top:2px; left:2px;
  width:12px; height:12px; border-radius:50%; background:#fff;
  transition:transform var(--transition);
}
[data-theme="light"] .toggle-thumb { transform:translateX(16px); }

/* ── Main ── */
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.topbar {
  height:54px; flex-shrink:0;
  background:var(--bg1); border-bottom:1px solid var(--border);
  display:flex; align-items:center; padding:0 24px; gap:16px;
  transition:background var(--transition);
}
.topbar-title { font-size:15px; font-weight:600; }
.topbar-sub { font-size:12px; color:var(--text3); }
.topbar-right { margin-left:auto; display:flex; align-items:center; gap:10px; }
.btn {
  display:inline-flex; align-items:center; gap:6px;
  padding:6px 14px; border-radius:var(--radius-sm);
  font-size:12px; font-weight:500; cursor:pointer;
  border:none; font-family:var(--font); transition:all var(--transition);
}
.btn-primary { background:var(--accent); color:#0d1814; }
.btn-primary:hover { opacity:0.88; transform:translateY(-1px); }
.btn-ghost { background:var(--bg3); color:var(--text2); border:1px solid var(--border2); }
.btn-ghost:hover { color:var(--text1); background:var(--bg2); }
.btn-danger { background:rgba(240,80,96,0.15); color:var(--danger); border:1px solid rgba(240,80,96,0.25); }
.btn-danger:hover { background:rgba(240,80,96,0.25); }

.content { flex:1; overflow-y:auto; padding:24px; }

/* ── Stats row ── */
.stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:24px; }
.stat-card {
  background:var(--bg1); border:1px solid var(--border);
  border-radius:var(--radius); padding:16px 18px;
  transition:background var(--transition);
}
.stat-label { font-size:11px; font-weight:500; letter-spacing:0.5px; text-transform:uppercase; color:var(--text3); margin-bottom:6px; }
.stat-val { font-size:24px; font-weight:600; font-family:var(--mono); letter-spacing:-1px; }
.stat-val.green { color:var(--success); }
.stat-val.warn { color:var(--warn); }
.stat-val.red { color:var(--danger); }
.stat-meta { font-size:11px; color:var(--text3); margin-top:4px; }

/* ── Grid ── */
.grid-2 { display:grid; grid-template-columns:1fr 380px; gap:16px; }

/* ── App list ── */
.panel {
  background:var(--bg1); border:1px solid var(--border);
  border-radius:var(--radius); overflow:hidden;
  transition:background var(--transition);
}
.panel-header {
  padding:14px 18px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:10px;
}
.panel-title { font-size:13px; font-weight:600; }
.panel-sub { font-size:11px; color:var(--text3); margin-left:auto; }

.app-row {
  padding:14px 18px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:12px; cursor:pointer;
  transition:background var(--transition);
}
.app-row:last-child { border-bottom:none; }
.app-row:hover { background:var(--bg2); }
.app-row.selected { background:rgba(0,201,167,0.06); }

.app-icon {
  width:36px; height:36px; border-radius:8px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:13px; font-weight:700; font-family:var(--mono);
}
.icon-dotnet { background:rgba(139,127,255,0.15); color:var(--purple); }
.icon-nuxt { background:rgba(0,201,167,0.12); color:var(--accent); }
.icon-vue { background:rgba(0,201,167,0.12); color:var(--accent); }
.icon-static { background:rgba(0,151,255,0.12); color:var(--accent2); }

.app-info { flex:1; min-width:0; }
.app-name { font-size:13px; font-weight:500; }
.app-meta { font-size:11px; color:var(--text3); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:1px; }

.status-dot {
  width:8px; height:8px; border-radius:50%; flex-shrink:0;
}
.dot-green { background:var(--success); box-shadow:0 0 6px var(--success); }
.dot-yellow { background:var(--warn); box-shadow:0 0 6px var(--warn); }
.dot-red { background:var(--danger); box-shadow:0 0 6px var(--danger); }
.dot-gray { background:var(--text3); }

.status-pill {
  font-size:10px; font-weight:600; letter-spacing:0.4px; text-transform:uppercase;
  padding:2px 8px; border-radius:99px; flex-shrink:0;
}
.pill-success { background:rgba(0,201,167,0.12); color:var(--accent); }
.pill-running {
  background:rgba(0,151,255,0.12); color:var(--accent2);
  animation:pillPulse 1.5s infinite;
}
@keyframes pillPulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
.pill-failed { background:rgba(240,80,96,0.12); color:var(--danger); }
.pill-queued { background:rgba(240,165,0,0.12); color:var(--warn); }
.pill-idle { background:var(--bg3); color:var(--text3); }

.app-time { font-size:10px; color:var(--text3); font-family:var(--mono); flex-shrink:0; min-width:70px; text-align:right; }

/* ── Right panel: detail ── */
.detail-tabs { display:flex; border-bottom:1px solid var(--border); }
.dtab {
  padding:12px 16px; font-size:12px; font-weight:500; color:var(--text3);
  cursor:pointer; border-bottom:2px solid transparent; transition:all var(--transition);
}
.dtab.active { color:var(--accent); border-bottom-color:var(--accent); }
.dtab:hover:not(.active) { color:var(--text1); }

/* ── Log pane ── */
.log-pane {
  background:var(--bg0); padding:14px; font-family:var(--mono);
  font-size:11px; line-height:1.8; height:280px; overflow-y:auto;
  color:var(--text2);
}
.log-line { display:flex; gap:10px; }
.log-ts { color:var(--text3); flex-shrink:0; }
.log-info { color:var(--text2); }
.log-success { color:var(--success); }
.log-warn { color:var(--warn); }
.log-error { color:var(--danger); }
.log-cmd { color:var(--purple); }
.log-cursor {
  display:inline-block; width:7px; height:12px;
  background:var(--accent); margin-left:2px; vertical-align:middle;
  animation:blink 1s step-end infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* ── Schedule config ── */
.schedule-form { padding:16px; display:flex; flex-direction:column; gap:14px; }
.form-group { display:flex; flex-direction:column; gap:5px; }
.form-label { font-size:11px; font-weight:500; color:var(--text3); text-transform:uppercase; letter-spacing:0.5px; }
.form-input, .form-select {
  background:var(--bg2); border:1px solid var(--border2);
  border-radius:var(--radius-sm); padding:7px 10px;
  color:var(--text1); font-size:12px; font-family:var(--mono);
  outline:none; transition:border-color var(--transition);
  width:100%;
}
.form-input:focus, .form-select:focus { border-color:var(--accent); }
.form-select option { background:var(--bg2); }
.cron-preview {
  background:var(--bg0); border:1px solid var(--border);
  border-radius:var(--radius-sm); padding:8px 10px;
  font-family:var(--mono); font-size:11px; color:var(--accent);
}
.cron-human { font-size:11px; color:var(--text3); font-family:var(--font); }

.cron-fields { display:grid; grid-template-columns:repeat(5,1fr); gap:6px; }
.cron-field { display:flex; flex-direction:column; gap:3px; text-align:center; }
.cron-flabel { font-size:9px; color:var(--text3); text-align:center; }
.cron-input {
  background:var(--bg2); border:1px solid var(--border2);
  border-radius:var(--radius-sm); padding:5px 4px;
  color:var(--text1); font-size:12px; font-family:var(--mono);
  outline:none; text-align:center; width:100%;
  transition:border-color var(--transition);
}
.cron-input:focus { border-color:var(--accent); }

.history-row {
  display:flex; align-items:center; gap:8px;
  padding:8px 16px; border-bottom:1px solid var(--border); font-size:11px;
}
.history-row:last-child { border-bottom:none; }
.history-commit { font-family:var(--mono); color:var(--accent2); font-size:10px; }
.history-msg { flex:1; color:var(--text2); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.history-time { color:var(--text3); flex-shrink:0; font-family:var(--mono); font-size:10px; }
.history-dur { color:var(--text3); flex-shrink:0; font-family:var(--mono); font-size:10px; min-width:36px; text-align:right; }

/* ── Deploy running animation ── */
.deploy-bar { height:2px; background:var(--bg3); border-radius:99px; overflow:hidden; margin:0; }
.deploy-progress {
  height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2));
  border-radius:99px; transition:width 0.4s ease;
}

/* ── Page anim ── */
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.stat-card { animation:fadeUp 0.3s ease both; }
.stat-card:nth-child(1){animation-delay:0.04s}
.stat-card:nth-child(2){animation-delay:0.08s}
.stat-card:nth-child(3){animation-delay:0.12s}
.stat-card:nth-child(4){animation-delay:0.16s}

/* ── Responsive ── */
@media(max-width:900px){
  .grid-2{grid-template-columns:1fr}
  .stats-row{grid-template-columns:repeat(2,1fr)}
}

/* ── Role pills ── */
.role-pill {
  font-size:9px; font-weight:600; letter-spacing:0.6px; text-transform:uppercase;
  padding:2px 7px; border-radius:99px; flex-shrink:0;
}
.role-master { background:rgba(139,127,255,0.15); color:var(--purple); }
.role-app    { background:rgba(0,201,167,0.12);   color:var(--accent); }
.role-proxy  { background:rgba(0,151,255,0.12);   color:var(--accent2); }
.role-db     { background:rgba(240,165,0,0.12);   color:var(--warn); }
.role-static { background:rgba(136,135,128,0.15); color:var(--text3); }

/* ── Server status dot ── */
.srv-online  { background:var(--success); box-shadow:0 0 5px var(--success); }
.srv-offline { background:var(--danger);  box-shadow:0 0 5px var(--danger); }
.srv-unknown { background:var(--text3); }

/* ── Server cards grid ── */
.servers-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:14px; }
@media(max-width:900px){ .servers-grid{grid-template-columns:1fr} }

.server-card {
  background:var(--bg1); border:1px solid var(--border);
  border-radius:var(--radius); padding:16px 18px;
  cursor:pointer; transition:all var(--transition);
}
.server-card:hover { border-color:var(--border2); background:var(--bg2); }
.server-card.selected { border-color:var(--accent); background:rgba(0,201,167,0.04); }
.server-card-header { display:flex; align-items:center; gap:10px; margin-bottom:12px; }
.server-card-ip {
  font-family:var(--mono); font-size:11px; color:var(--text3);
  background:var(--bg3); padding:2px 7px; border-radius:4px;
}
.server-card-name { font-size:13px; font-weight:600; flex:1; }

/* Resource bars */
.res-row { display:flex; align-items:center; gap:8px; margin-bottom:5px; }
.res-label { font-size:10px; color:var(--text3); width:32px; flex-shrink:0; }
.res-bar { flex:1; height:4px; background:var(--bg3); border-radius:99px; overflow:hidden; }
.res-fill { height:100%; border-radius:99px; transition:width 0.4s ease; }
.res-fill.low  { background:var(--accent); }
.res-fill.mid  { background:var(--warn); }
.res-fill.high { background:var(--danger); }
.res-pct { font-size:10px; font-family:var(--mono); color:var(--text3); width:28px; text-align:right; }

.server-tags { display:flex; gap:4px; flex-wrap:wrap; margin-top:10px; }
.server-tag {
  font-size:9px; padding:1px 6px; border-radius:4px;
  background:var(--bg3); color:var(--text3); border:1px solid var(--border);
}

/* ── Per-target deploy rows (in detail panel) ── */
.target-section { padding:12px 16px; border-bottom:1px solid var(--border); }
.target-section:last-child { border-bottom:none; }
.target-header { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.target-ip { font-family:var(--mono); font-size:11px; color:var(--text3); }
.target-name { font-size:12px; font-weight:500; flex:1; }
.target-log { font-family:var(--mono); font-size:10px; color:var(--text3); margin-top:4px; line-height:1.7; }
.target-log .tl-ok  { color:var(--accent); }
.target-log .tl-err { color:var(--danger); }
.target-log .tl-cmd { color:var(--purple); }
.target-log .tl-run { color:var(--accent2); }

/* ── Nginx badge ── */
.nginx-badge {
  font-size:9px; font-weight:600; padding:1px 6px; border-radius:4px;
  background:rgba(0,151,255,0.1); color:var(--accent2); border:1px solid rgba(0,151,255,0.2);
}

/* ── Add server btn inside server list ── */
.add-server-row {
  padding:12px 18px; border-top:1px solid var(--border);
  display:flex; align-items:center; gap:8px;
  color:var(--text3); cursor:pointer; font-size:12px;
  transition:all var(--transition);
}
.add-server-row:hover { color:var(--accent); background:var(--bg2); }

/* ── Modal overlay ── */
.modal-overlay {
  position:fixed; inset:0; z-index:100;
  background:rgba(0,0,0,0.6); backdrop-filter:blur(4px);
  display:flex; align-items:center; justify-content:center;
  opacity:0; pointer-events:none; transition:opacity 0.2s ease;
}
.modal-overlay.open { opacity:1; pointer-events:all; }

.modal {
  background:var(--bg1); border:1px solid var(--border2);
  border-radius:14px; width:600px; max-width:calc(100vw - 32px);
  max-height:calc(100vh - 48px); display:flex; flex-direction:column;
  transform:translateY(16px) scale(0.98);
  transition:transform 0.22s cubic-bezier(0.34,1.36,0.64,1), opacity 0.2s ease;
  overflow:hidden;
}
.modal-overlay.open .modal { transform:translateY(0) scale(1); }

.modal-header {
  padding:18px 20px 14px;
  border-bottom:1px solid var(--border);
  display:flex; align-items:flex-start; gap:12px; flex-shrink:0;
}
.modal-header-icon {
  width:36px; height:36px; border-radius:9px; flex-shrink:0;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex; align-items:center; justify-content:center;
}
.modal-title { font-size:15px; font-weight:600; line-height:1.3; }
.modal-subtitle { font-size:12px; color:var(--text3); margin-top:2px; }
.modal-close {
  margin-left:auto; cursor:pointer; color:var(--text3);
  width:28px; height:28px; border-radius:6px;
  display:flex; align-items:center; justify-content:center;
  transition:all 0.15s; flex-shrink:0;
}
.modal-close:hover { background:var(--bg3); color:var(--text1); }

/* Steps indicator */
.modal-steps {
  display:flex; align-items:center; gap:0;
  padding:12px 20px; border-bottom:1px solid var(--border);
  flex-shrink:0; overflow-x:auto;
}
.mstep {
  display:flex; align-items:center; gap:7px;
  font-size:11px; font-weight:500; color:var(--text3);
  white-space:nowrap;
}
.mstep.active { color:var(--text1); }
.mstep.done { color:var(--accent); }
.mstep-num {
  width:20px; height:20px; border-radius:50%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:10px; font-weight:600;
  background:var(--bg3); color:var(--text3);
  border:1px solid var(--border2);
}
.mstep.active .mstep-num { background:var(--accent); color:#0d1814; border-color:transparent; }
.mstep.done .mstep-num { background:rgba(0,201,167,0.15); color:var(--accent); border-color:var(--accent); }
.mstep-sep { width:24px; height:1px; background:var(--border2); margin:0 4px; flex-shrink:0; }

/* Modal body */
.modal-body { flex:1; overflow-y:auto; padding:20px; }
.modal-footer {
  padding:14px 20px; border-top:1px solid var(--border);
  display:flex; align-items:center; gap:10px; flex-shrink:0;
}
.modal-footer-left { flex:1; font-size:11px; color:var(--text3); }

/* App type selector */
.type-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:20px; }
.type-card {
  border:1.5px solid var(--border2); border-radius:var(--radius);
  padding:14px 12px; cursor:pointer; transition:all 0.15s;
  display:flex; flex-direction:column; align-items:center; gap:8px; text-align:center;
}
.type-card:hover { border-color:var(--border2); background:var(--bg2); }
.type-card.selected { border-color:var(--accent); background:rgba(0,201,167,0.06); }
.type-card-icon {
  width:40px; height:40px; border-radius:10px;
  display:flex; align-items:center; justify-content:center;
  font-size:15px; font-weight:700; font-family:var(--mono);
}
.type-card-name { font-size:12px; font-weight:600; }

  color:var(--text3); margin-bottom:8px; margin-top:16px;

.msec-label:first-child { margin-top:0; }

/* Form rows */
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.form-group { display:flex; flex-direction:column; gap:5px; margin-bottom:12px; }
.form-group:last-child { margin-bottom:0; }
.form-label { font-size:11px; font-weight:500; color:var(--text3); text-transform:uppercase; letter-spacing:0.5px; }

.form-input, .form-select, .form-textarea {

}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color:var(--accent); background:var(--bg1);

.form-input::placeholder { color:var(--text3); }
.form-select option { background:var(--bg2); }
.form-textarea { resize:vertical; min-height:64px; line-height:1.6; }
.form-hint { font-size:10px; color:var(--text3); margin-top:2px; line-height:1.5; }

/* Env var rows */
.env-list { display:flex; flex-direction:column; gap:6px; }
.env-row { display:grid; grid-template-columns:1fr 1fr 28px; gap:6px; align-items:center; }
.env-del {
  width:28px; height:28px; border-radius:var(--radius-sm);

.env-del:hover { background:rgba(240,80,96,0.12); color:var(--danger); }
.add-row-btn {

  cursor:pointer; padding:4px 0; border:none; background:none;
  font-family:var(--font); transition:opacity 0.15s; margin-top:4px;
}
.add-row-btn:hover { opacity:0.7; }

.cron-fields { display:grid; grid-template-columns:repeat(5,1fr); gap:6px; margin-bottom:8px; }
.cron-field { display:flex; flex-direction:column; gap:3px; }
.cron-flabel { font-size:9px; color:var(--text3); text-align:center; text-transform:uppercase; letter-spacing:0.5px; }
.cron-input {
  background:var(--bg2); border:1px solid var(--border2);
  border-radius:var(--radius-sm); padding:6px 4px;
  color:var(--text1); font-size:12px; font-family:var(--mono);
  outline:none; text-align:center; width:100%;
  transition:border-color 0.15s;

.cron-input:focus { border-color:var(--accent); }
.cron-preview-box {
  background:var(--bg0); border:1px solid var(--border);
  border-radius:var(--radius-sm); padding:8px 12px;
  display:flex; align-items:center; justify-content:space-between;
  gap:12px;

.cron-expr { font-family:var(--mono); font-size:12px; color:var(--accent); }
.cron-human { font-size:11px; color:var(--text3); }

/* Quick cron presets */
.cron-presets { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px; }
.cron-preset {
  padding:3px 10px; border-radius:99px; font-size:10px; font-weight:500;
  border:1px solid var(--border2); color:var(--text2); cursor:pointer;
  transition:all 0.15s; background:transparent; font-family:var(--font);
}
.cron-preset:hover { border-color:var(--accent); color:var(--accent); }

/* Review section */
.review-block {
  background:var(--bg2); border:1px solid var(--border);
  border-radius:var(--radius); padding:14px 16px; margin-bottom:10px;

.review-row { display:flex; justify-content:space-between; align-items:baseline; padding:4px 0; }

.review-val { font-size:11px; font-family:var(--mono); color:var(--text1); text-align:right; max-width:60%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.review-val.accent { color:var(--accent); }
.review-section-title { font-size:10px; font-weight:600; letter-spacing:0.8px; text-transform:uppercase; color:var(--text3); margin:14px 0 6px; }
.review-section-title:first-child { margin-top:0; }

/* Step anim */
.step-panel { animation:fadeUp 0.18s ease both; }
@keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

/* Success state */
.modal-success {

.success-title { font-size:16px; font-weight:600; }
.success-sub { font-size:12px; color:var(--text3); max-width:320px; line-height:1.6; }

// ── Status helpers ──
function pillHtml(status) {
  const map = {
    success:'<span class="status-pill pill-success">success</span>',
    running:'<span class="status-pill pill-running">running</span>',
    failed:'<span class="status-pill pill-failed">failed</span>',
    queued:'<span class="status-pill pill-queued">queued</span>',
    idle:'<span class="status-pill pill-idle">idle</span>',
  };
  return map[status] || '';
}
function dotHtml(status) {
  const map = {success:'dot-green',running:'dot-green',failed:'dot-red',idle:'dot-gray',queued:'dot-yellow'};
  return `<div class="status-dot ${map[status]||'dot-gray'}"></div>`;
}

function nginxAction(action, srvId) {
  const srv = SERVERS.find(s=>s.id===srvId);
  if (!srv) return;
  const msgs = {
    reload: `Reloading nginx on ${srv.ip}...\nnginx -t && systemctl reload nginx`,
    test: `Testing nginx config on ${srv.ip}...\nnginx: the configuration file /etc/nginx/nginx.conf syntax is ok\nnginx: configuration file /etc/nginx/nginx.conf test is successful`,
    install: `Installing nginx on ${srv.ip}...\napt-get install -y nginx\nSystemctl enable nginx`,
    editor: `Nginx site config editor for ${srv.ip} — coming soon.`,
  };
  if (action === 'install') { srv.nginx = true; }
  alert(msgs[action] || action);
  if (action === 'install') render();
}

// ── Main render ──
function render() {
  const content = document.getElementById('main-content');
  if (!content) return;
  const titles = {
    dashboard:['Dashboard','Production server · Linux (systemd)'],
    schedule:['Schedules','Cron-based auto deploy'],
    apps:['Applications','All registered apps'],
    queue:['Queue','Pending jobs'],
    history:['Deploy history','All past deploys'],
    servers:['Servers','Connected servers'],
    settings:['Settings','Global config'],
  };
  const [title, sub] = titles[currentPage] || ['Dashboard',''];
  document.getElementById('page-title').textContent = title;
  document.getElementById('page-sub').textContent = sub;

  if (currentPage === 'dashboard') {
    content.innerHTML = renderDashboard();
    const lp = document.getElementById('log-pane');
    if (lp) lp.scrollTop = lp.scrollHeight;
  } else if (currentPage === 'schedule') {
    content.innerHTML = renderSchedulePage();
  } else if (currentPage === 'servers') {
    content.innerHTML = renderServersPage();
    // show offline badge on sidebar
    const ob = document.getElementById('offline-badge');
    const offlineCount = SERVERS.filter(s=>s.status!=='online').length;
    if (ob) { ob.style.display = offlineCount ? '' : 'none'; ob.textContent = offlineCount||''; }
  } else {
    content.innerHTML = `<div style="color:var(--text3);padding:40px;text-align:center;font-size:13px">${title} — coming soon</div>`;
  }
}

function selectApp(id) {
  selectedApp = APPS.find(a=>a.id===id) || APPS[0];
  activeTab = 'logs';
  currentPage = 'dashboard';
  render();
}

function setTab(t) {
  activeTab = t;
  render();
}

let cronParts = [];
function updateCron(input, idx) {
  const preview = document.getElementById('cron-preview');
  const humanEl = document.getElementById('cron-human');
  if (!preview) return;
  const allInputs = document.querySelectorAll('.cron-input');
  const parts = Array.from(allInputs).map(el=>el.value||'*');
  if (preview) preview.textContent = parts.join(' ');
  if (humanEl) {
    const humans = {
      '0 2 * * *':'Every day at 02:00',
      '30 2 * * *':'Every day at 02:30',
      '0 3 * * 1':'Every Monday at 03:00',
      '0 4 * * *':'Every day at 04:00',
      '0 0 * * 0':'Every Sunday at 00:00',
      '0 1 * * 0':'Every Sunday at 01:00',
    };
    humanEl.textContent = humans[parts.join(' ')] || 'Custom schedule';
  }
}

function triggerDeploy(e, id) {
  e.stopPropagation();
  const app = APPS.find(a=>a.id===id);
  if (!app) return;
  if (app.status === 'running') { alert('Already deploying!'); return; }
  app.status = 'running';
  app.lastDeploy = 'Just now';
  app.progress = 0;
  render();
  let p = 0;
  const iv = setInterval(()=>{
    p += Math.random()*12+4;
    app.progress = Math.min(p, 97);
    const bar = document.querySelector(`.app-row:nth-child(${APPS.indexOf(app)+1}) .deploy-progress`);
    if (bar) bar.style.width = app.progress+'%';
    if (p >= 100) {
      clearInterval(iv);
      app.status = 'success';
      app.lastDeploy = 'Just now';
      app.progress = 100;
      app.history.unshift({hash:Math.random().toString(36).slice(2,9),msg:'Manual deploy',time:'just now',dur:Math.round(30+Math.random()*30)+'s',status:'success'});
      render();
    }
  }, 400);
}

function deployAll() {
  APPS.filter(a=>a.status!=='running').forEach((app,i)=>{
    setTimeout(()=>triggerDeploy({stopPropagation:()=>{}}, app.id), i*600);
  });
}

function rollback(id) {
  const app = APPS.find(a=>a.id===id);
  if (!app) return;
  if (confirm(`Rollback ${app.name} to previous build?`)) {
    app.status = 'success';
    app.lastDeploy = 'Just now';
    render();
  }
}
function rollbackTo(hash) {
  if (confirm(`Rollback to commit ${hash}?`)) alert('Rollback triggered (simulated)');
}
function stopService(id) {
  const app = APPS.find(a=>a.id===id);
  if (app && confirm(`Stop ${app.service}?`)) { app.status = 'idle'; render(); }
}
function saveCron(id) {
  const preview = document.getElementById('cron-preview');
  if (preview) {
    const app = APPS.find(a=>a.id===id);
    if (app) {
      app.schedule.cron = preview.textContent;
      app.schedule.enabled = true;
    }
  }
  alert('Schedule saved!');
}

function updateStepIndicators() {
  for (let i = 1; i <= TOTAL_STEPS; i++) {
    const el = document.getElementById('step-ind-'+i);
    if (!el) continue;
    el.className = 'mstep';
    if (i < modalStep) el.classList.add('done');
    else if (i === modalStep) el.classList.add('active');
    const num = el.querySelector('.mstep-num');
    if (i < modalStep) num.innerHTML = `<svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    else num.textContent = i;
  }
}

function modalNext() {
  if (modalStep === 1) {
    if (!modalData.name.trim()) {
      document.getElementById('m-name') && document.getElementById('m-name').focus();
      shakeInput('m-name'); return;
    }
  }
  if (modalStep === 2) {
    if (!modalData.repo.trim()) { shakeInput('m-repo'); return; }
    if (!modalData.branch.trim()) { shakeInput('m-branch'); return; }
  }
  if (modalStep === 3) {
    if (!modalData.deployDir.trim()) { shakeInput('m-deploy'); return; }
    if (!modalData.serviceName.trim()) { shakeInput('m-svc'); return; }
  }
  if (modalStep === TOTAL_STEPS) {
    submitApp(); return;
  }
  modalStep++;
  renderModalStep();
  document.getElementById('modal-body').scrollTop = 0;
}

function modalBack() {
  if (modalStep > 1) { modalStep--; renderModalStep(); }
}

function selectType(id) {
  modalData.type = id;
  const t = APP_TYPES.find(x=>x.id===id);
  if (t) {
    modalData.buildCmd = t.buildCmd;
    modalData.outputDir = t.outputDir;
    if (!modalData.envVars.filter(e=>e.key).length) {
      modalData.envVars = id==='dotnet'
        ? [{key:'ASPNETCORE_ENVIRONMENT',val:'Production'},{key:'',val:''}]
        : [{key:'NODE_ENV',val:'production'},{key:'',val:''}];
    }
  }
  // Update card highlight without full re-render
  document.querySelectorAll('.type-card').forEach(el => el.classList.remove('selected'));
  const cards = document.querySelectorAll('.type-card');
  const idx = APP_TYPES.findIndex(x=>x.id===id);
  if (cards[idx]) cards[idx].classList.add('selected');
}

function addEnvVar() {
  const list = document.getElementById('env-list');
  if (!list) return;
  const i = modalData.envVars.length;
  modalData.envVars.push({key:'',val:''});
  const row = document.createElement('div');
  row.className = 'env-row';
  row.id = 'env-row-'+i;
  row.innerHTML = `<input class="form-input" placeholder="KEY" value="" oninput="modalData.envVars[${i}].key=this.value">
    <input class="form-input" placeholder="value" value="" oninput="modalData.envVars[${i}].val=this.value">
    <button class="env-del" onclick="removeEnvVar(${i})">×</button>`;
  list.appendChild(row);
  row.querySelector('input').focus();
}
function removeEnvVar(i) {
  modalData.envVars.splice(i,1);
  // Re-render just the env list
  const list = document.getElementById('env-list');
  if (!list) return;
  list.innerHTML = modalData.envVars.map((ev,idx)=>`
    <div class="env-row" id="env-row-${idx}">
      <input class="form-input" placeholder="KEY" value="${ev.key}" oninput="modalData.envVars[${idx}].key=this.value">
      <input class="form-input" placeholder="value" value="${ev.val}" oninput="modalData.envVars[${idx}].val=this.value">
      <button class="env-del" onclick="removeEnvVar(${idx})">×</button>
    </div>`).join('');
}

function toggleSchedEnabled() {
  modalData.scheduleEnabled = !modalData.scheduleEnabled;
  const track = document.getElementById('sched-track');
  const thumb = document.getElementById('sched-thumb');
  const lbl = document.getElementById('sched-label');
  const form = document.getElementById('sched-form');
  if (track) track.style.background = modalData.scheduleEnabled ? 'var(--accent)' : '';
  if (thumb) thumb.style.transform = modalData.scheduleEnabled ? 'translateX(16px)' : '';
  if (lbl) lbl.textContent = modalData.scheduleEnabled ? 'Schedule enabled' : 'Schedule disabled';
  if (form) form.style.cssText = modalData.scheduleEnabled ? '' : 'opacity:0.35;pointer-events:none';
}

function applyCronPreset(val) {
  modalData.cron = val;
  const parts = val.split(' ');
  for (let i=0;i<5;i++) {
    const el = document.getElementById('cron-f-'+i);
    if (el) el.value = parts[i]||'*';
  }
  const prev = document.getElementById('mcron-preview');
  const hum = document.getElementById('mcron-human');
  if (prev) prev.textContent = val;
  if (hum) hum.textContent = humanizeCron(val);
}

function updateModalCron() {
  const parts = [];
  for (let i=0;i<5;i++) {
    const el = document.getElementById('cron-f-'+i);
    parts.push(el ? el.value||'*' : '*');
  }
  modalData.cron = parts.join(' ');
  const prev = document.getElementById('mcron-preview');
  const hum = document.getElementById('mcron-human');
  if (prev) prev.textContent = modalData.cron;
  if (hum) hum.textContent = humanizeCron(modalData.cron);
}

function humanizeCron(cron) {
  const map = {
    '0 0 * * *':'Every day at midnight',
    '0 2 * * *':'Every day at 02:00',
    '0 4 * * *':'Every day at 04:00',
    '0 */6 * * *':'Every 6 hours',
    '0 2 * * 1':'Every Monday at 02:00',
    '0 * * * *':'Every hour',
    '30 2 * * *':'Every day at 02:30',
    '0 3 * * 1':'Every Monday at 03:00',
    '0 1 * * 0':'Every Sunday at 01:00',
    '0 0 * * 0':'Every Sunday at midnight',
    '* * * * *':'Every minute',
  };
  return map[cron] || 'Custom schedule';
}

function shakeInput(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.style.borderColor = 'var(--danger)';
  el.style.animation = 'shake 0.3s ease';
  el.focus();
  setTimeout(()=>{ el.style.animation=''; el.style.borderColor=''; }, 600);
}

function submitApp() {
  const steps = document.getElementById('modal-steps');
  const footer = document.getElementById('modal-footer');
  const body = document.getElementById('modal-body');
  if (!body) return;
  if (steps) steps.style.display = 'none';
  if (footer) footer.style.display = 'none';
  const t = APP_TYPES.find(x=>x.id===modalData.type);
  body.innerHTML = `<div class="modal-success">
    <div class="success-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M5 12l5 5 9-9" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div class="success-title">${escHtml(modalData.name)} added!</div>
    <div class="success-sub">App registered as <code style="color:var(--accent2);font-family:var(--mono)">${escHtml(modalData.serviceName||modalData.name.toLowerCase().replace(/\s+/g,'-'))}</code>. First deploy will start shortly.</div>
    <div style="display:flex;gap:10px;margin-top:8px">
      <button class="btn btn-primary" onclick="finalizeApp()">Go to dashboard</button>
      <button class="btn btn-ghost" onclick="addAnotherApp()">Add another</button>
    </div>
  </div>`;

  // Actually add the app to the list
  const newApp = {
    id: modalData.serviceName || modalData.name.toLowerCase().replace(/\s+/g,'-'),
    name: modalData.name,
    type: modalData.type,
    icon: t ? t.icon : '??',
    iconClass: t ? t.cls : 'icon-static',
    branch: modalData.branch || 'main',
    repo: modalData.repo.replace('https://github.com/','').replace('.git',''),
    status: 'queued',
    lastDeploy: 'Pending',
    lastCommit: 'Initial deploy',
    commitHash: '—',
    duration: '—',
    service: modalData.serviceName,
    port: parseInt(modalData.port)||null,
    url: modalData.port ? `http://localhost:${modalData.port}` : null,
    schedule: { enabled: modalData.scheduleEnabled, cron: modalData.cron, label: humanizeCron(modalData.cron) },
    history: [],
  };
  APPS.unshift(newApp);
  selectedApp = newApp;
  document.getElementById('queue-badge').textContent = APPS.filter(a=>a.status==='queued'||a.status==='running').length;
}

function finalizeApp() {
  closeModal();
  currentPage = 'dashboard';
  render();
}

function addAnotherApp() {
  openAddApp();
}

// shake keyframe
const shakeStyle = document.createElement('style');
shakeStyle.textContent = '@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}';
document.head.appendChild(shakeStyle);

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Init ──
document.addEventListener('DOMContentLoaded', () => {
  render();
  // show offline badge if any server offline
  const ob = document.getElementById('offline-badge');
  const offlineCount = SERVERS.filter(s=>s.status!=='online').length;
  if (ob && offlineCount) { ob.style.display = ''; ob.textContent = offlineCount; }
});

// Simulate progress for running app
setInterval(()=>{
  const running = APPS.filter(a=>a.status==='running');
  running.forEach(app=>{
    if(app.progress<97) {
      app.progress = Math.min((app.progress||50)+1, 97);
      const rows = document.querySelectorAll('.deploy-progress');
      const idx = APPS.indexOf(app);
      if (rows[idx]) rows[idx].style.width = app.progress+'%';
    }
  });
}, 1000);
</script>
</body>
</html>
